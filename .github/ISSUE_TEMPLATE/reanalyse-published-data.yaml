name: Reanalyse published data
description: Provide parameters for reanalysis of published data
title: Reanalyse published data
labels: ['reanalysis']
assignees: ['']

body:
  - type: input
    id: doi
    attributes:
      label: DOI
      placeholder: e.g., 10.1234/example
    validations:
      required: true
      pattern: '^\d{2}\.\d{4,}/.*'

  - type: input
    id: analysis_title
    attributes:
      label: Analysis title
      description: A name for the analysis to use on Nemo
      placeholder: Enter the title of the analysis
    validations:
      required: true

  - type: dropdown
    id: udg_treatment
    attributes:
      label: UDG treatment
      description: UDG treatment applied to the library preparations
      options:
        - unknown
        - full
        - half
        - untreated
    validations:
      required: true

  - type: dropdown
    id: strandedness
    attributes:
      label: Strandedness
      description: Strandedness of the library preparations
      options:
        - unknown
        - double
        - single
    validations:
      required: true

  # - type: input
  #   id: data_location
  #   attributes:
  #     label: Data location/accession
  #     placeholder: e.g., SRA accession number, local path
  #   validations:
  #     required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority/Resource request
      description: Priority level for the reanalysis request
      default: 2
      options:
        - low
        - standard
        - high

  - type: textarea
    id: user_provided_notes
    attributes:
      label: Notes
      placeholder: Enter any additional notes or context
      description: Free text field for user-supplied notes (supports markdown)

  - type: input
    id: contact_email
    attributes:
      label: Notification email
      description: Email address to receive notifications about the reanalysis request